services:
  mc:
    image: itzg/minecraft-server
    environment:
      EULA: true
      TYPE: FABRIC
      FABRIC_LAUNCHER_VERSION: 1.1.1
      FABRIC_LOADER_VERSION: 0.19.3
      VERSION: 26.1.2
      UID: "${MINECRAFT_UID:?missing MINECRAFT_UID}"
      GID: "${MINECRAFT_GID:?missing MINECRAFT_GID}"
      SEED: 6378
      WHITELIST: |
        sargon2
      OPS: |
        sargon2
      MODRINTH_PROJECTS: |
        fabric-api
        # Not sure if this is needed for distant horizons to work
        # view-distance-fix:fabric-1.0.2+26.1.2
    ports:
      - "25565:25565"
    volumes:
      - ./minecraft_data:/data
    stdin_open: true
    tty: true
    restart: unless-stopped
volumes:
  data: {}
